<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Data Curator — parameters</title>
<style>
  :root {
    color-scheme: dark;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    /* Nocturne: committed dark "instrument" theme. Blue-tinted near-blacks in
       three depth layers (page < side < card), one decisive accent, data glows. */
    --bg: #0E1116;
    --side: #12161D;
    --card: #161B22;
    --field: #10141A;
    --border: #2E3742;
    --border-soft: #212832;
    --text: #E8ECF3;
    --muted: #8792A3;
    --accent: #4C8DFF;
    --accent-hover: #6BA1FF;
    --accent-contrast: #071227;
    --accent-bg: #16273D;
    --accent-text: #9FC2FF;
    --sel: #172A42;
    --ok: #34D399;
    --err: #F87171;
    --row-hover: #1A212B;
    --log-bg: #0B0E13;
    --shadow-color: rgba(0, 0, 0, 0.5);
    --radius: 11px; --radius-sm: 7px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html, body { height: 100%; }
  body { margin: 0; padding: 14px 22px 18px; box-sizing: border-box; display: flex; flex-direction: column;
         overflow: hidden; background: var(--bg); color: var(--text); font-size: 13px;
         -webkit-font-smoothing: antialiased; }
  h1 { font-size: 18px; font-weight: 650; letter-spacing: -0.015em; margin: 0;
       display: inline-flex; align-items: center; gap: 9px; }
  h1::before { content: ''; width: 15px; height: 15px; border-radius: 5px; flex: none; background: var(--accent);
       box-shadow: 0 1px 3px color-mix(in oklch, var(--accent) 45%, transparent); }
  .sub { color: var(--muted); font-size: 12px; margin: 2px 0 0; font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; }
  .bar { flex: none; display: flex; justify-content: space-between; align-items: center; gap: 12px;
         padding-bottom: 13px; border-bottom: 1px solid var(--border-soft);
         transition: border-color 0.3s var(--ease); }
  body.running .bar { border-bottom-color: var(--accent); }
  .bar > div:last-child { display: flex; align-items: center; gap: 8px; }
  /* indeterminate top progress: only present while a run is live, conveys "running" */
  #progress { height: 3px; margin: 0 -22px; overflow: hidden; flex: none; }
  #progress::after { content: ''; display: block; height: 100%; width: 38%;
       background: var(--accent); transform: translateX(-105%);
       box-shadow: 0 0 10px color-mix(in oklch, var(--accent) 60%, transparent); }
  body.running #progress::after { animation: indeterminate 1.15s cubic-bezier(0.65, 0, 0.35, 1) infinite; }
  @keyframes indeterminate { 0% { transform: translateX(-105%); } 100% { transform: translateX(360%); } }
  .bento { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 12px; padding-top: 13px; }
  .bentoMain { flex: 1; min-height: 0; display: grid; grid-template-columns: minmax(320px, 1fr) minmax(0, 1.75fr); gap: 12px; }
  .leftcol { min-height: 0; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .kpis { flex: none; display: grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap: 12px; }
  .kpi { background-color: var(--side); border: 1px solid var(--border-soft); border-radius: var(--radius);
         padding: 9px 14px 11px; box-shadow: 0 1px 2px var(--shadow-color); }
  .kpiLabel { font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; text-transform: uppercase;
              letter-spacing: 0.1em; font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .kpiValue { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1.1; }
  .kpiHero { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .spark { display: flex; align-items: flex-end; gap: 3px; height: 38px; flex: 1; max-width: 58%; }
  .sparkBar { flex: 1; border-radius: 2px 2px 0 0; min-height: 3px; transition: height 0.25s var(--ease); }
  .mChart { flex: none; }
  .chartHead { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  #chartPick { width: auto; max-width: 62%; padding: 4px 8px; font-size: 12px; }
  .chartMeta { font-size: 11px; color: var(--muted); font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lwchart { height: 170px; border-radius: var(--radius-sm); overflow: hidden; }
  fieldset { background-color: var(--card); border: 1px solid var(--border-soft); border-radius: var(--radius); margin: 0;
             padding: 13px 16px 15px; min-width: 0; box-shadow: 0 1px 2px var(--shadow-color); position: relative;
             background-image: radial-gradient(rgba(76, 141, 255, 0.05) 1px, transparent 1.4px); background-size: 22px 22px; }
  .side > fieldset { background-color: var(--side); }
  fieldset::before, fieldset::after { content: ''; position: absolute; width: 11px; height: 11px; pointer-events: none; }
  fieldset::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
                     border-top-left-radius: var(--radius); }
  fieldset::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent);
                    border-bottom-right-radius: var(--radius); }
  legend { font-size: 10px; font-weight: 600; color: var(--accent-text); padding: 0 8px;
           font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
           text-transform: uppercase; letter-spacing: 0.11em; }
  legend span { font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .boxIds, .boxRun, .boxCols { display: flex; flex-direction: column; min-height: 0; }
  .boxIds { flex: none; }
  .boxRun { flex: 1; }
  .boxCols { min-height: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px 14px; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  #apikeys { grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); align-items: start; }
  .keyfield { display: flex; flex-direction: column; min-width: 0; }
  .keyhead { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
  .keyname { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .keystate { margin-left: auto; flex: none; font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
              text-transform: uppercase; color: var(--muted); }
  .keystate.set { color: var(--ok); }
  .keysub { font-size: 10px; color: var(--muted); margin-bottom: 4px; opacity: 0.85;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  input, select { width: 100%; box-sizing: border-box; padding: 6px 9px; font-size: 13px;
                  border: 1px solid var(--border); border-radius: var(--radius-sm);
                  background: var(--field); color: var(--text);
                  transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease); }
  input:hover, select:hover { border-color: var(--muted); }
  input:focus-visible, select:focus-visible {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  input::placeholder { color: var(--muted); opacity: 0.8; }
  input[type="date"] { font-variant-numeric: tabular-nums; }
  input[type="checkbox"] { width: 15px; height: 15px; margin: 0; flex: none; accent-color: var(--accent); cursor: pointer; }
  .row { display: flex; gap: 8px; margin: 9px 0; flex: none; }
  .row input { flex: 1; }
  button { padding: 6px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm);
           background: var(--card); color: var(--text); cursor: pointer;
           transition: background-color 0.14s var(--ease), border-color 0.14s var(--ease), transform 0.06s var(--ease); }
  button:hover { background: var(--row-hover); border-color: var(--muted); }
  button:active { background: var(--border-soft); transform: translateY(0.5px); }
  button:disabled { opacity: 0.5; cursor: default; }
  #run { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); font-weight: 600;
         box-shadow: 0 1px 2px color-mix(in oklch, var(--accent) 42%, transparent); }
  #run:hover { background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-1px);
               box-shadow: 0 3px 9px color-mix(in oklch, var(--accent) 42%, transparent); }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; flex: none; }
  .presets button { font-size: 12px; padding: 3px 11px; border-radius: 99px; color: var(--muted); }
  .presets button:hover { color: var(--text); border-color: var(--muted); transform: translateY(-1px); }
  /* custom saved lists — accent-tinted to stand apart from the neutral index presets */
  #customLists { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: none; }
  .clpill { display: inline-flex; align-items: center; }
  .clload { font-size: 12px; padding: 3px 9px; border-radius: 99px 0 0 99px; border: 1px solid var(--accent);
            border-right: none; color: var(--accent-text); background: var(--accent-bg); }
  .cldel { font-size: 13px; line-height: 1; padding: 3px 7px; border-radius: 0 99px 99px 0;
           border: 1px solid var(--accent); color: var(--accent-text); background: var(--accent-bg); }
  .cldel:hover { color: var(--err); background: var(--accent-bg); }
  .clsave { font-size: 12px; padding: 3px 10px; border-radius: 99px; color: var(--muted);
            border: 1px dashed var(--border); background: none; }
  .clsave:hover { color: var(--text); background: var(--row-hover); }
  /* ETF browser — collapsible topic tree of individually selectable ETF pills */
  .etfbox { flex: none; }
  .etftoggle, .etfsub { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left;
            border: none; background: none; padding: 5px 4px; font-size: 12px; color: var(--text); border-radius: 6px; }
  .etftoggle:hover, .etfsub:hover { background: var(--row-hover); }
  .etfbody { margin-top: 2px; border: 1px solid var(--border-soft);
             border-radius: 8px; background: var(--field); padding: 2px 6px 8px; }
  .etfgrp { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.03em; padding: 8px 4px 2px; }
  .etfsub { color: var(--muted); }
  .etfsub:hover { color: var(--text); }
  .etfall { margin-left: auto; font-size: 10px; padding: 1px 7px; border: 1px solid var(--border-soft);
            border-radius: 5px; color: var(--muted); background: var(--card); }
  .etfall:hover { color: var(--text); border-color: var(--muted); }
  .etfpills { display: flex; flex-wrap: wrap; gap: 4px; padding: 1px 4px 6px 20px; }
  .etfpill { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border-soft);
             color: var(--muted); background: var(--card);
             font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
             transition: transform 0.12s var(--ease), border-color 0.12s var(--ease), color 0.12s var(--ease); }
  .etfpill:hover { color: var(--text); border-color: var(--muted); transform: translateY(-1px); }
  .etfpill.on { color: var(--accent-text); border-color: var(--accent); background: var(--accent-bg); }
  /* Browsers + chips share one scroll region so expanding a browser scrolls
     within the Identifiers box instead of bleeding over the Run output panel. */
  .idscroll { flex: none; min-height: 130px; max-height: 42vh; overflow-y: auto; display: flex; flex-direction: column; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; }
  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--field); color: var(--text);
          border: 1px solid var(--border-soft); padding: 2px 4px 2px 9px; border-radius: var(--radius-sm); font-size: 12px;
          font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; height: fit-content;
          transition: border-color 0.14s var(--ease); }
  .chip:hover { border-color: var(--border); }
  .chip button { border: none; background: none; cursor: pointer; color: var(--muted); padding: 0 3px;
                 font-size: 14px; line-height: 1; border-radius: 4px; transition: color 0.12s var(--ease); }
  .chip button:hover { color: var(--err); background: none; border: none; }
  .cols { flex: 1; min-height: 0; overflow: auto; border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
          background: var(--field); }
  .col { display: flex; align-items: center; gap: 10px; padding: 5px 12px; font-size: 13px;
         font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; color: var(--text); cursor: pointer;
         transition: background-color 0.12s var(--ease), color 0.12s var(--ease); }
  .col:hover { background: var(--row-hover); }
  /* selected rows tint toward the accent — the picker reads its own state at a glance */
  .col:has(> input:checked) { background: var(--sel); color: var(--accent-text); font-weight: 500; }
  .col:has(> input:checked):hover { background: var(--sel); }
  .grouphdr { position: sticky; top: 0; z-index: 1; display: flex; align-items: center; gap: 8px; font-weight: 600;
              font-size: 12px; color: var(--text); background: var(--card); margin: 0; padding: 8px 12px 7px;
              border-bottom: 1px solid var(--border-soft); cursor: pointer; user-select: none;
              transition: background-color 0.12s var(--ease); }
  .grouphdr:hover { background: var(--row-hover); }
  .chev { display: inline-block; width: 12px; color: var(--muted); font-size: 11px; }
  .gdot { width: 8px; height: 8px; border-radius: 50%; flex: none;
          box-shadow: 0 0 0 2px color-mix(in oklch, var(--card), transparent 100%); }
  .grouphdr:hover .gdot { box-shadow: 0 0 0 3px color-mix(in oklch, currentColor 14%, transparent); }
  .gcount { color: var(--muted); font-weight: 400; font-variant-numeric: tabular-nums; }
  legend.collapsible { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; border-radius: 5px; }
  legend.collapsible:hover { color: var(--text); }
  legend.collapsible:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .gactions { margin-left: auto; display: flex; gap: 4px; }
  .mini { padding: 1px 8px; font-size: 11px; border-radius: 5px; color: var(--muted); border-color: var(--border-soft); }
  .mini:hover { color: var(--text); }
  .status { font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .status:not(:empty)::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex: none;
                                background: var(--muted); }
  .status.ok::before { background: var(--ok); }
  .status.err::before { background: var(--err); }
  .status.run::before { background: var(--accent); animation: pulse 1.4s ease-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) {
    .status.run::before { animation: none; }
    input, select, button { transition: none; }
    body.running #progress::after { animation: none; width: 100%; transform: none; }
    #run:hover, .presets button:hover, .etfpill:hover { transform: none; }
  }
  .ok { color: var(--ok); } .err { color: var(--err); }
  #runLog { flex: 1; min-height: 0; overflow: auto; margin: 0; padding: 9px 11px; font-size: 12px; line-height: 1.55;
            white-space: pre-wrap; background: var(--log-bg); border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm); color: var(--text); }
  .ptimer { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
</style>
</head>
<body>
<div class="bar">
  <div><h1>Data Curator — parameters</h1><p class="sub" id="path">Config/data_curator_parameters.json</p></div>
  <div><span class="status" id="status"></span> <span class="ptimer" id="ptimer"></span> <button id="reload">Reload</button> <button id="save">Save</button> <button id="run">Save &amp; run</button> <button id="stop" disabled>Stop</button></div>
</div>
<div id="progress"></div>

<div class="bento">
  <div class="kpis" id="kpis"></div>

  <fieldset><legend>General</legend><div class="grid" id="general"></div></fieldset>

  <fieldset><legend class="collapsible" id="keysLegend" tabindex="0" role="button" aria-expanded="false"></legend><div class="grid" id="apikeys"></div></fieldset>

  <div class="bentoMain">
    <div class="leftcol">
      <fieldset class="boxIds"><legend>Identifiers (<span id="idCount">0</span>)</legend>
        <div class="presets" id="presets"></div>
        <div id="customLists"></div>
        <div class="row"><input id="idInput" placeholder="Add ticker…" /><button id="idAdd">Add</button></div>
        <div class="idscroll">
          <div class="etfbox" id="etfBox"></div>
          <div class="etfbox" id="fundBox"></div>
          <div class="chips" id="idChips"></div>
        </div>
      </fieldset>

      <fieldset class="mChart"><legend>Chart</legend>
        <div class="chartHead">
          <select id="chartPick" aria-label="Chart series"></select>
          <span class="chartMeta" id="chartMeta"></span>
        </div>
        <div id="lwchart" class="lwchart"></div>
      </fieldset>

      <fieldset class="boxRun" id="runBox" style="display:none"><legend>Run output</legend>
        <pre id="runLog"></pre>
      </fieldset>
    </div>

    <fieldset class="boxCols"><legend>Output columns (<span id="colCount">0</span> selected)</legend>
      <div class="row"><input id="colSearch" placeholder="Search columns or type a custom c_… then Enter" /></div>
      <div class="cols" id="cols"></div>
    </fieldset>
  </div>
</div>

<script src="/vendor/lightweight-charts.js"></script>
<script>
const GENERAL_FIELDS = [
  ['market_data_provider', 'select'], ['fundamental_data_provider', 'select'],
  ['start_date', 'date'], ['end_date', 'date'],
  ['period', 'select'], ['output_format', 'select'], ['logger_level', 'select'],
  ['output_directory', 'text'],
];
let state = null, catalog = null, envStatus = [], collapsedGroups = new Set();
let customLists = [], apiKeysOpen = false;
const etfState = { expanded: false, open: new Set() };
const fundState = { expanded: false, open: new Set() };

const KEY_LABELS = {
  KNDC_API_KEY_FMP: 'Financial Modeling Prep',
  KNDC_API_KEY_LSEG: 'LSEG Workspace',
  KNDC_API_KEY_FRED: 'FRED',
  KNDC_API_KEY_BANXICO: 'Banxico SIE',
  KNDC_API_KEY_INEGI: 'INEGI',
};

const KEY_SUBS = {
  KNDC_API_KEY_FMP: 'Equities & fundamentals',
  KNDC_API_KEY_LSEG: 'Equities & fundamentals',
  KNDC_API_KEY_FRED: 'United States · macro',
  KNDC_API_KEY_BANXICO: 'Mexico · rates & FX',
  KNDC_API_KEY_INEGI: 'Mexico · CPI & jobs',
};

// One muted category hue per top-level column group, so the picker reads like a
// legend: colour carries meaning (which family a column belongs to), never decoration.
const GROUP_COLORS = {
  'Market data': '#4C8DFF',
  'Fundamental': '#C084FC',
  'Balance sheet': '#2DD4BF',
  'Cash flow': '#34D399',
  'Income statement': '#FBBF24',
  'Dividends': '#F472B6',
  'Splits': '#FB923C',
  'Calculations': '#38BDF8',
  'Economic (macro)': '#E879F9',
  _default: '#6B7686',
};

async function boot() {
  try {
    catalog = await (await fetch('/api/catalog')).json();
    state = await (await fetch('/api/config')).json();
    envStatus = await (await fetch('/api/env')).json();
    customLists = ((await (await fetch('/api/lists')).json()).lists) || [];
  } catch (e) {
    setStatus('Not connected', 'err');
    document.getElementById('general').innerHTML =
      '<p style="grid-column:1/-1; margin:0; font-size:14px; color:var(--err);">' +
      'This page needs the Data Curator server — it cannot run as a standalone file.<br />' +
      'Start it from your project directory with: <code>python -m kaxanuk.data_curator start</code><br />' +
      'then open the address it prints (default <code>http://127.0.0.1:8753</code>).</p>';
    return;
  }
  collapsedGroups = new Set(catalog.groups.map(g => g.label));
  for (const g of catalog.groups) {
    if (g.subgroups) for (const sg of g.subgroups) collapsedGroups.add(g.label + ' ▸ ' + sg.label);
  }
  collapsedGroups.add('Custom / other');
  renderGeneral(); renderKeys(); renderKeysToggle(); renderPresets(); renderCustomLists();
  renderEtfBrowser(); renderFundBrowser();
  renderIdentifiers(); renderColumns(); renderStats(); setStatus('');
}

function renderKeysToggle() {
  const lg = document.getElementById('keysLegend'); lg.innerHTML = '';
  const setCount = envStatus.filter(e => e.set).length;
  const chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = apiKeysOpen ? '▾' : '▸';
  const cnt = document.createElement('span'); cnt.className = 'gcount'; cnt.textContent = setCount + '/' + envStatus.length + ' set';
  lg.appendChild(chev); lg.appendChild(document.createTextNode('API keys ')); lg.appendChild(cnt);
  lg.setAttribute('aria-expanded', String(apiKeysOpen));
  document.getElementById('apikeys').style.display = apiKeysOpen ? '' : 'none';
  const toggle = () => { apiKeysOpen = !apiKeysOpen; renderKeysToggle(); };
  lg.onclick = toggle;
  lg.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } };
}

function renderKeys() {
  const root = document.getElementById('apikeys'); root.innerHTML = '';
  for (const entry of envStatus) {
    const displayName = KEY_LABELS[entry.name] || entry.name;
    const wrap = document.createElement('div');
    wrap.className = 'keyfield';
    const head = document.createElement('div');
    head.className = 'keyhead';
    const name = document.createElement('span');
    name.className = 'keyname';
    name.textContent = displayName;
    name.title = entry.name;
    const stateTag = document.createElement('span');
    stateTag.className = 'keystate' + (entry.set ? ' set' : '');
    stateTag.textContent = entry.set ? 'Saved' : 'Not set';
    head.appendChild(name); head.appendChild(stateTag);
    const input = document.createElement('input');
    input.type = 'password';
    input.autocomplete = 'off';
    input.dataset.env = entry.name;
    input.setAttribute('aria-label', displayName + ' API key');
    input.placeholder = entry.set ? 'Type to replace' : 'Paste key';
    wrap.appendChild(head);
    const subText = KEY_SUBS[entry.name];
    if (subText) {
      const sub = document.createElement('div');
      sub.className = 'keysub';
      sub.textContent = subText;
      wrap.appendChild(sub);
    }
    wrap.appendChild(input); root.appendChild(wrap);
  }
}

async function saveKeys() {
  const updates = {};
  for (const input of document.querySelectorAll('#apikeys input')) {
    const value = input.value.trim();
    if (value) updates[input.dataset.env] = value;
  }
  if (!Object.keys(updates).length) return true;
  const res = await fetch('/api/env', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) });
  if (res.ok) {
    envStatus = await (await fetch('/api/env')).json();
    renderKeys(); renderKeysToggle();
  }
  return res.ok;
}

function setStatus(msg, cls) { const s = document.getElementById('status'); s.textContent = msg; s.className = 'status ' + (cls || ''); }

function renderGeneral() {
  const root = document.getElementById('general'); root.innerHTML = '';
  for (const [key, type] of GENERAL_FIELDS) {
    const wrap = document.createElement('div');
    const label = document.createElement('label'); label.textContent = key; wrap.appendChild(label);
    let input;
    if (type === 'select') {
      input = document.createElement('select');
      for (const opt of catalog.options[key]) {
        const o = document.createElement('option'); o.value = o.textContent = opt; input.appendChild(o);
      }
    } else if (type === 'text') {
      input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Output';
      input.title = 'Folder for the output files — a folder outside OneDrive/Dropbox runs faster';
    } else { input = document.createElement('input'); input.type = 'date'; }
    input.value = state.general[key] || (type === 'text' ? 'Output' : '');
    input.addEventListener('change', () => { state.general[key] = input.value; renderStats(); });
    wrap.appendChild(input); root.appendChild(wrap);
  }
}

function renderPresets() {
  const root = document.getElementById('presets'); root.innerHTML = '';
  for (const preset of (catalog.identifier_presets || [])) {
    const b = document.createElement('button');
    b.textContent = preset.label + ' (' + preset.identifiers.length + ')';
    b.title = 'Add all ' + preset.label + ' constituents';
    b.onclick = () => {
      const have = new Set(state.identifiers);
      for (const t of preset.identifiers) { if (!have.has(t)) { state.identifiers.push(t); have.add(t); } }
      renderIdentifiers();
    };
    root.appendChild(b);
  }
  const clear = document.createElement('button');
  clear.textContent = 'Clear';
  clear.title = 'Remove all identifiers';
  clear.onclick = () => { state.identifiers = []; renderIdentifiers(); };
  root.appendChild(clear);
}

function renderIdentifiers() {
  const chips = document.getElementById('idChips'); chips.innerHTML = '';
  state.identifiers.forEach((id, i) => {
    const chip = document.createElement('span'); chip.className = 'chip'; chip.textContent = id;
    const x = document.createElement('button'); x.textContent = '×';
    x.onclick = () => { state.identifiers.splice(i, 1); renderIdentifiers(); };
    chip.appendChild(x); chips.appendChild(chip);
  });
  document.getElementById('idCount').textContent = state.identifiers.length;
  renderStats();
  renderChart();
  if (etfState.expanded) renderEtfBrowser();
  if (fundState.expanded) renderFundBrowser();
}

function addIdentifier() {
  const input = document.getElementById('idInput'); const v = input.value.trim();
  if (v && !state.identifiers.includes(v)) { state.identifiers.push(v); input.value = ''; renderIdentifiers(); }
}

// Add one or more tickers, skipping any already present, then refresh the views.
function addTickers(tickers) {
  const have = new Set(state.identifiers);
  let added = false;
  for (const t of tickers) { if (!have.has(t)) { state.identifiers.push(t); have.add(t); added = true; } }
  if (added) renderIdentifiers();
}

function renderCustomLists() {
  const root = document.getElementById('customLists'); root.innerHTML = '';
  for (const lst of customLists) {
    const wrap = document.createElement('span'); wrap.className = 'clpill';
    const load = document.createElement('button'); load.className = 'clload';
    load.textContent = '★ ' + lst.name + ' (' + lst.identifiers.length + ')';
    load.title = 'Add the ' + lst.identifiers.length + ' identifiers in “' + lst.name + '”';
    load.onclick = () => addTickers(lst.identifiers);
    const del = document.createElement('button'); del.className = 'cldel'; del.textContent = '×';
    del.title = 'Delete saved list “' + lst.name + '”';
    del.onclick = () => deleteCustomList(lst.name);
    wrap.appendChild(load); wrap.appendChild(del); root.appendChild(wrap);
  }
  const save = document.createElement('button'); save.className = 'clsave'; save.textContent = 'Save list…';
  save.title = 'Save the current identifiers as a named, reusable list';
  save.onclick = saveCustomList;
  root.appendChild(save);
}

async function saveCustomList() {
  if (!state.identifiers.length) { setStatus('Add identifiers before saving a list', 'err'); return; }
  const name = (window.prompt('Name this identifier list:') || '').trim();
  if (!name) return;
  let data = {};
  try {
    const res = await fetch('/api/lists', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, identifiers: state.identifiers }),
    });
    data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error((data.errors && data.errors[0]) || 'Could not save list');
  } catch (e) { setStatus(e.message || 'Could not save list', 'err'); return; }
  customLists = data.lists || customLists;
  renderCustomLists();
  setStatus('Saved list “' + name + '”', 'ok');
}

async function deleteCustomList(name) {
  let data = {};
  try {
    const res = await fetch('/api/lists/delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error((data.errors && data.errors[0]) || 'Could not delete list');
  } catch (e) { setStatus(e.message || 'Could not delete list', 'err'); return; }
  customLists = data.lists || [];
  renderCustomLists();
}

// Generic collapsible ticker browser (group → subgroup → pills). Drives both the
// ETF catalog and the Mexican-fund catalog; itemsKey selects the per-subgroup list.
function renderTickerBrowser(boxId, groups, itemsKey, st, label, flat) {
  const box = document.getElementById(boxId); box.innerHTML = '';
  if (!groups || !groups.length) return;
  const render = () => renderTickerBrowser(boxId, groups, itemsKey, st, label, flat);
  const total = groups.reduce((a, g) => a + g.subgroups.reduce((b, s) => b + (s[itemsKey] || []).length, 0), 0);

  const top = document.createElement('button'); top.className = 'etftoggle';
  const chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = st.expanded ? '▾' : '▸';
  top.appendChild(chev); top.appendChild(document.createTextNode(' ' + label + ' '));
  const tc = document.createElement('span'); tc.className = 'gcount'; tc.textContent = total; top.appendChild(tc);
  top.onclick = () => { st.expanded = !st.expanded; render(); };
  box.appendChild(top);
  if (!st.expanded) return;

  const selected = new Set(state.identifiers);
  const body = document.createElement('div'); body.className = 'etfbody';
  // One collapsible row plus its pill list. Drives both the theme rows (2-level
  // mode) and, when flat, the operadora rows (provider → its funds directly).
  const addRow = (rowLabel, items, key) => {
    const open = st.open.has(key);
    const sub = document.createElement('button'); sub.className = 'etfsub';
    const sc = document.createElement('span'); sc.className = 'chev'; sc.textContent = open ? '▾' : '▸';
    sub.appendChild(sc); sub.appendChild(document.createTextNode(' ' + rowLabel + ' '));
    const cnt = document.createElement('span'); cnt.className = 'gcount'; cnt.textContent = items.length;
    sub.appendChild(cnt);
    const all = document.createElement('span'); all.className = 'etfall'; all.textContent = 'all';
    all.title = 'Add all in ' + rowLabel;
    all.onclick = (e) => { e.stopPropagation(); addTickers(items.map(x => x.ticker)); };
    sub.appendChild(all);
    sub.onclick = () => { if (st.open.has(key)) st.open.delete(key); else st.open.add(key); render(); };
    body.appendChild(sub);
    if (!open) return;
    const pills = document.createElement('div'); pills.className = 'etfpills';
    for (const it of items) {
      const b = document.createElement('button'); b.className = 'etfpill'; b.textContent = it.ticker;
      b.title = it.name; b.setAttribute('aria-label', it.ticker + ' — ' + it.name);
      if (selected.has(it.ticker)) b.classList.add('on');
      b.onclick = () => addTickers([it.ticker]);
      pills.appendChild(b);
    }
    body.appendChild(pills);
  };

  for (const g of groups) {
    if (flat) {
      // Provider is the collapsible row; all its theme funds list directly under it.
      addRow(g.label, g.subgroups.flatMap(s => s[itemsKey] || []), g.label);
      continue;
    }
    const gh = document.createElement('div'); gh.className = 'etfgrp'; gh.textContent = g.label; body.appendChild(gh);
    for (const sg of g.subgroups) {
      addRow(sg.label, sg[itemsKey] || [], g.label + ' ▸ ' + sg.label);
    }
  }
  box.appendChild(body);
}

function renderEtfBrowser() {
  renderTickerBrowser('etfBox', catalog.etf_groups || [], 'etfs', etfState, 'ETFs by topic');
}

function renderFundBrowser() {
  renderTickerBrowser('fundBox', catalog.mx_fund_groups || [], 'funds', fundState, 'Fondos de inversión MX (Yahoo)', true);
}

let groupCounters = [];

function statTile(label, value, color) {
  const cell = document.createElement('div'); cell.className = 'kpi';
  const lab = document.createElement('div'); lab.className = 'kpiLabel'; lab.textContent = label;
  const val = document.createElement('div'); val.className = 'kpiValue'; val.textContent = value;
  val.style.color = color;
  cell.appendChild(lab); cell.appendChild(val);
  return cell;
}

function renderStats() {
  const g = state.general || {};
  const yr = (d) => (d && String(d).slice(0, 4)) || '—';
  const root = document.getElementById('kpis'); root.innerHTML = '';

  root.appendChild(statTile('Identifiers', String(state.identifiers.length), '#4C8DFF'));

  // Hero tile: total columns + a live per-group bar-spark, each bar in its group's colour,
  // so the shape of what you've pulled reads at a glance.
  const selected = new Set(state.columns);
  const perGroup = (catalog.groups || []).map(grp => {
    const cols = grp.subgroups ? grp.subgroups.flatMap(sg => sg.columns) : (grp.columns || []);
    return { label: grp.label, sel: cols.filter(c => selected.has(c)).length,
             total: cols.length, color: GROUP_COLORS[grp.label] || GROUP_COLORS._default };
  });
  const hero = document.createElement('div'); hero.className = 'kpi kpiHero';
  const left = document.createElement('div');
  const hl = document.createElement('div'); hl.className = 'kpiLabel'; hl.textContent = 'Columns';
  const hv = document.createElement('div'); hv.className = 'kpiValue'; hv.textContent = String(state.columns.length);
  hv.style.color = '#38BDF8';
  left.appendChild(hl); left.appendChild(hv);
  const spark = document.createElement('div'); spark.className = 'spark';
  const maxSel = Math.max(1, ...perGroup.map(x => x.sel));
  for (const x of perGroup) {
    const bar = document.createElement('div'); bar.className = 'sparkBar';
    bar.style.height = (x.sel > 0 ? Math.max(16, Math.round((x.sel / maxSel) * 100)) : 8) + '%';
    bar.style.background = x.sel > 0 ? x.color : 'var(--border)';
    bar.title = x.label + ': ' + x.sel + ' / ' + x.total;
    spark.appendChild(bar);
  }
  hero.appendChild(left); hero.appendChild(spark);
  root.appendChild(hero);

  root.appendChild(statTile('Range', yr(g.start_date) + '–' + yr(g.end_date), '#2DD4BF'));
  root.appendChild(statTile('Output', (g.output_format || 'csv').toUpperCase(), '#FBBF24'));
}

let lwChart = null, lwSeries = null, chartKey = null;

function ensureChart() {
  if (lwChart || typeof LightweightCharts === 'undefined') return;
  lwChart = LightweightCharts.createChart(document.getElementById('lwchart'), {
    autoSize: true,
    layout: { attributionLogo: false, background: { color: 'transparent' }, textColor: '#8792A3', fontSize: 11,
              fontFamily: 'ui-monospace, "Cascadia Mono", Consolas, monospace' },
    grid: { vertLines: { color: 'rgba(46,55,66,0.30)' }, horzLines: { color: 'rgba(46,55,66,0.30)' } },
    rightPriceScale: { borderColor: '#2E3742' },
    timeScale: { borderColor: '#2E3742' },
  });
  lwSeries = lwChart.addAreaSeries({ lineWidth: 2 });
}

// Charts the curator's OWN data via TradingView's open-source Lightweight Charts:
// the first identifier's price (Yahoo) or any selected macro e_* series (curator
// providers), both from the panel's /api/series endpoint. Dark, to match the panel.
async function loadChart(value) {
  ensureChart();
  const meta = document.getElementById('chartMeta');
  if (!lwSeries || !value) { if (meta) meta.textContent = ''; return; }
  chartKey = value;
  const cut = value.indexOf(':');
  const kind = value.slice(0, cut), key = value.slice(cut + 1);
  const macro = kind === 'macro';
  lwSeries.applyOptions(macro
    ? { lineColor: '#2DD4BF', topColor: 'rgba(45,212,191,0.24)', bottomColor: 'rgba(45,212,191,0.02)' }
    : { lineColor: '#4C8DFF', topColor: 'rgba(76,141,255,0.26)', bottomColor: 'rgba(76,141,255,0.02)' });
  meta.textContent = 'loading…';
  try {
    const res = await fetch('/api/series?' + (macro ? 'macro=' : 'symbol=') + encodeURIComponent(key));
    const d = await res.json();
    if (!res.ok || d.error) { meta.textContent = d.error || 'no data'; lwSeries.setData([]); return; }
    const pts = (d.points || []).map(p => ({ time: p.time, value: p.value }));
    lwSeries.setData(pts);
    lwChart.timeScale().fitContent();
    meta.textContent = d.label + ' · ' + pts.length + ' pts';
  } catch (err) { meta.textContent = 'connection error'; }
}

function renderChart() {
  const sel = document.getElementById('chartPick');
  if (!sel) return;
  const opts = [];
  if (state.identifiers[0]) opts.push(['price:' + state.identifiers[0], 'Price · ' + state.identifiers[0]]);
  for (const c of state.columns.filter(x => x.startsWith('e_')).sort()) opts.push(['macro:' + c, 'Macro · ' + c]);
  const prev = sel.value;
  sel.innerHTML = '';
  if (!opts.length) {
    const o = document.createElement('option'); o.value = ''; o.textContent = 'Add a ticker or an e_ column';
    sel.appendChild(o); loadChart('');

    return;
  }
  for (const [v, t] of opts) { const o = document.createElement('option'); o.value = v; o.textContent = t; sel.appendChild(o); }
  const values = opts.map(o => o[0]);
  sel.value = values.includes(prev) ? prev : values[0];
  if (sel.value !== chartKey) loadChart(sel.value);
}

function refreshCounts() {
  const selected = new Set(state.columns);
  for (const counter of groupCounters) {
    const count = counter.columns.filter(c => selected.has(c)).length;
    counter.span.textContent = count + '/' + counter.columns.length;
  }
  document.getElementById('colCount').textContent = state.columns.length;
  renderStats();
  renderChart();
}

function groupHeader(label, columns, expanded, key, depth) {
  key = key || label; depth = depth || 0;
  const hdr = document.createElement('div'); hdr.className = 'grouphdr';
  if (depth) { hdr.style.paddingLeft = (12 + depth * 18) + 'px'; hdr.style.fontWeight = '500'; }
  const chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = expanded ? '▾' : '▸';
  const title = document.createElement('span'); title.textContent = label;
  const count = document.createElement('span'); count.className = 'gcount';
  hdr.appendChild(chev);
  if (!depth) {
    const dot = document.createElement('span'); dot.className = 'gdot';
    dot.style.background = GROUP_COLORS[label] || GROUP_COLORS._default;
    hdr.appendChild(dot);
  }
  hdr.appendChild(title); hdr.appendChild(count);
  hdr.onclick = () => {
    if (collapsedGroups.has(key)) collapsedGroups.delete(key); else collapsedGroups.add(key);
    renderColumns();
  };
  if (columns.length) {
    groupCounters.push({ span: count, columns: columns });
    const actions = document.createElement('span'); actions.className = 'gactions';
    const all = document.createElement('button'); all.className = 'mini'; all.textContent = 'all';
    all.onclick = (e) => { e.stopPropagation(); for (const c of columns) { if (!state.columns.includes(c)) state.columns.push(c); } renderColumns(); };
    const none = document.createElement('button'); none.className = 'mini'; none.textContent = 'none';
    none.onclick = (e) => { e.stopPropagation(); state.columns = state.columns.filter(c => !columns.includes(c)); renderColumns(); };
    actions.appendChild(all); actions.appendChild(none); hdr.appendChild(actions);
  }
  return hdr;
}

function renderColumns() {
  const root = document.getElementById('cols'); root.innerHTML = '';
  groupCounters = [];
  const selected = new Set(state.columns);
  const filter = document.getElementById('colSearch').value.trim().toLowerCase();
  const known = new Set();
  for (const group of catalog.groups) {
    if (group.subgroups) {
      // Nested group (e.g. Economic): one parent set -> country subsets -> columns.
      group.subgroups.forEach(sg => sg.columns.forEach(c => known.add(c)));
      const subMatches = group.subgroups
        .map(sg => ({ sg, matches: [...sg.columns].sort().filter(c => !filter || c.toLowerCase().includes(filter)) }))
        .filter(x => x.matches.length);
      if (!subMatches.length) continue;
      const allCols = subMatches.flatMap(x => x.matches);
      const pExpanded = filter ? true : !collapsedGroups.has(group.label);
      root.appendChild(groupHeader(group.label, allCols, pExpanded));
      if (pExpanded) {
        for (const { sg, matches } of subMatches) {
          const subKey = group.label + ' ▸ ' + sg.label;
          const sExpanded = filter ? true : !collapsedGroups.has(subKey);
          root.appendChild(groupHeader(sg.label, matches, sExpanded, subKey, 1));
          if (sExpanded) {
            const labels = sg.column_labels || {};
            for (const col of matches) {
              root.appendChild(columnRow(col, selected.has(col), labels[col], 1));
            }
          }
        }
      }
      continue;
    }
    group.columns.forEach(c => known.add(c));
    const matches = [...group.columns].sort().filter(c => !filter || c.toLowerCase().includes(filter));
    if (!matches.length) continue;
    const expanded = filter ? true : !collapsedGroups.has(group.label);
    root.appendChild(groupHeader(group.label, matches, expanded));
    if (expanded) {
      const labels = group.column_labels || {};
      for (const col of matches) {
        root.appendChild(columnRow(col, selected.has(col), labels[col]));
      }
    }
  }
  const custom = state.columns.filter(c => !known.has(c) && (!filter || c.toLowerCase().includes(filter))).sort();
  if (custom.length) {
    const expanded = filter ? true : !collapsedGroups.has('Custom / other');
    root.appendChild(groupHeader('Custom / other', custom, expanded));
    if (expanded) {
      custom.forEach(c => root.appendChild(columnRow(c, true)));
    }
  }
  refreshCounts();
}

function columnRow(col, checked, label, depth) {
  const row = document.createElement('label'); row.className = 'col';
  if (depth) row.style.paddingLeft = (depth * 18) + 'px';
  const box = document.createElement('input'); box.type = 'checkbox'; box.checked = checked;
  box.onchange = () => {
    if (box.checked) { if (!state.columns.includes(col)) state.columns.push(col); }
    else { state.columns = state.columns.filter(c => c !== col); }
    refreshCounts();
  };
  const displayText = label ? label + ' (' + col + ')' : col;
  row.appendChild(box); row.appendChild(document.createTextNode(displayText));
  return row;
}

async function save() {
  setStatus('Saving…');
  const keysOk = await saveKeys();
  const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
  if (res.ok && keysOk) { setStatus('Saved', 'ok'); }
  else if (!res.ok) { const data = await res.json(); setStatus((data.errors || ['Error']).join('; '), 'err'); }
  else { setStatus('Config saved, but saving API keys failed', 'err'); }
  return res.ok && keysOk;
}

let runTimer = null, runActive = false;

function startRunPolling() {
  runActive = true;
  if (runTimer) clearInterval(runTimer);
  runTimer = setInterval(pollRun, 2000);
}

function stopRunPolling() {
  runActive = false;
  if (runTimer) { clearInterval(runTimer); runTimer = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (runTimer) { clearInterval(runTimer); runTimer = null; }
  } else if (runActive && !runTimer) {
    pollRun();
    runTimer = setInterval(pollRun, 2000);
  }
});

function formatElapsed(seconds) {
  if (seconds === null || seconds === undefined) return '';
  const total = Math.floor(seconds);
  const m = Math.floor(total / 60);
  const s = String(total % 60).padStart(2, '0');
  return m + ':' + s;
}

function updateTimer(status) {
  document.getElementById('ptimer').textContent = formatElapsed(status.elapsed);
}

async function saveAndRun() {
  const ok = await save();
  if (!ok) return;
  const res = await fetch('/api/run', { method: 'POST' });
  document.getElementById('runBox').style.display = '';
  if (!res.ok) {
    const data = await res.json();
    setStatus(data.state === 'running' ? 'Already running' : 'Run failed to start', 'err');
    document.getElementById('runLog').textContent = data.output || '';
    updateTimer(data);
    if (data.state === 'running') { document.body.classList.add('running'); document.getElementById('stop').disabled = false; startRunPolling(); }
    return;
  }
  setStatus('Running…', 'run');
  document.body.classList.add('running');
  document.getElementById('runLog').textContent = 'Running… output appears when the run finishes.';
  document.getElementById('stop').disabled = false;
  updateTimer({ elapsed: 0 });
  startRunPolling();
}

async function stopRun() {
  setStatus('Stopping…', 'run');
  document.getElementById('stop').disabled = true;
  await fetch('/api/run/stop', { method: 'POST' });
  // The poller reconciles to the final 'stopped'/'failed'/'done' state and the
  // disabled toggle.
  pollRun();
}

function firstCriticalLine(output) {
  const match = (output || '').split('\n').find(line => line.includes('[CRITICAL]'));
  return match ? match.replace('[CRITICAL]', '').trim() : null;
}

async function pollRun() {
  const s = await (await fetch('/api/run')).json();
  updateTimer(s);
  document.getElementById('stop').disabled = s.state !== 'running';
  if (s.state === 'running') return;
  document.body.classList.remove('running');
  document.getElementById('runLog').textContent = s.output || '(no output)';
  const critical = firstCriticalLine(s.output);
  if (s.state === 'stopped') { setStatus('Run stopped', 'err'); }
  else if (critical) { setStatus('Run failed: ' + critical, 'err'); }
  else if (s.state === 'done') { setStatus('Run finished — check the Output folder', 'ok'); }
  else if (s.state === 'failed') { setStatus('Run failed — see the run output below', 'err'); }
  stopRunPolling();
}

document.getElementById('idAdd').onclick = addIdentifier;
document.getElementById('idInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addIdentifier(); } });
document.getElementById('colSearch').addEventListener('input', renderColumns);
document.getElementById('colSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault(); const v = e.target.value.trim();
    if (v && !state.columns.includes(v)) { state.columns.push(v); e.target.value = ''; renderColumns(); }
  }
});
document.getElementById('save').onclick = save;
document.getElementById('run').onclick = saveAndRun;
document.getElementById('stop').onclick = stopRun;
document.getElementById('chartPick').addEventListener('change', (e) => loadChart(e.target.value));
document.getElementById('reload').onclick = boot;
boot();
